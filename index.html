	<!doctype html>
	<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hecht Patrol">
<meta name="theme-color" content="#111827">
<title>Hecht Security Patrol | iPad Command Center</title>
<style>
:root{--bg:#0b1220;--panel:#111827;--panel2:#1f2937;--text:#f9fafb;--muted:#cbd5e1;--gold:#d4af37;--line:#374151;--danger:#ef4444;--ok:#22c55e;--blue:#60a5fa}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(145deg,#030712,#111827);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(3,7,18,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;gap:12px;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:12px}.seal{width:46px;height:46px;border:2px solid var(--gold);border-radius:50%;display:grid;place-items:center;font-weight:900;color:var(--gold)}h1{font-size:18px;margin:0;color:var(--gold)}.sub{font-size:12px;color:var(--muted)}main{padding:16px;max-width:1100px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{background:rgba(17,24,39,.95);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 28px rgba(0,0,0,.25)}.card h2{margin:0 0 10px;font-size:18px;color:var(--gold)}button,.btn{appearance:none;border:0;border-radius:12px;background:var(--gold);color:#111827;font-weight:800;padding:12px 14px;margin:4px 4px 4px 0;cursor:pointer;text-decoration:none;display:inline-block}button.secondary{background:#334155;color:#fff}button.danger{background:var(--danger);color:#fff}button.ok{background:var(--ok);color:#052e16}.hidden{display:none!important}label{display:block;font-size:13px;color:var(--muted);margin:10px 0 5px}input,select,textarea{width:100%;background:#030712;color:#fff;border:1px solid #475569;border-radius:12px;padding:12px;font-size:16px}textarea{min-height:90px;resize:vertical}.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}.check{display:flex;gap:8px;align-items:center;background:#030712;border:1px solid #334155;border-radius:10px;padding:9px}.check input{width:auto}.toolbar{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}.report-item{border-bottom:1px solid var(--line);padding:10px 0}.badge{display:inline-block;border:1px solid var(--gold);color:var(--gold);border-radius:999px;padding:3px 8px;font-size:12px}.muted{color:var(--muted)}.big{font-size:26px;font-weight:900;color:var(--gold)}.printReport{background:white;color:#111;padding:30px;font-family:Arial,sans-serif}.printReport h1{color:#111;border-bottom:3px solid #111;padding-bottom:8px}.printReport table{width:100%;border-collapse:collapse;margin-top:10px}.printReport td,.printReport th{border:1px solid #444;padding:7px;vertical-align:top}.printReport .small{font-size:12px;color:#444}@media print{body{background:white;color:#000}header,.no-print,#appNav{display:none!important}.card{border:0;box-shadow:none;background:white;color:#000}.printReport{display:block!important}.screen{display:none!important}}
</style>
</head>
<body>
<header class="no-print">
 <div class="brand"><div class="seal">HS</div><div><h1>HECHT SECURITY PATROL</h1><div class="sub">iPad Enterprise Offline Command Center</div></div></div>
 <button class="secondary" onclick="showScreen('dashboard')">Dashboard</button>
</header>
<main>
 <section id="dashboard" class="screen">
  <div class="grid">
   <div class="card"><h2>Shift Command</h2><div class="big" id="todayCount">0</div><div class="muted">Reports saved on this iPad</div><div class="toolbar"><button onclick="newDAR()">New DAR</button><button class="secondary" onclick="newIncident()">New Incident</button></div></div>
   <div class="card"><h2>Quick Forms</h2><button onclick="newVehicle()">Vehicle / Tow</button><button onclick="newMaintenance()">Lights Out / Maintenance</button><button onclick="newTrespass()">Trespass Warning</button><button onclick="newTraffic()">Traffic Warning</button></div>
   <div class="card"><h2>Saved Reports</h2><button class="secondary" onclick="showScreen('reports');renderReports()">View / Search Reports</button><button class="secondary" onclick="exportBackup()">Export Backup</button><label class="btn secondary" for="importFile">Import Backup</label><input id="importFile" class="hidden" type="file" accept="application/json" onchange="importBackup(event)"></div>
   <div class="card"><h2>Setup</h2><label>Default Property</label><input id="defaultProperty" value="Parkside Apartments | 3214 Valley Bluff Drive, Atlanta, GA"><label>Default Officer</label><input id="defaultOfficer" value="Timothy Heiberger"><button class="ok" onclick="saveSetup()">Save Setup</button></div>
  </div>
 </section>

 <section id="formScreen" class="screen hidden"><div class="card"><h2 id="formTitle">Report</h2><div id="formBody"></div><div class="toolbar"><button onclick="saveCurrentReport()">Save Report</button><button class="secondary" onclick="previewCurrentReport()">Preview / Print PDF</button><button class="secondary" onclick="emailCurrentReport()">Email Report</button><button class="danger" onclick="showScreen('dashboard')">Cancel</button></div></div></section>
 <section id="reports" class="screen hidden"><div class="card"><h2>Saved Reports</h2><input id="search" placeholder="Search by type, property, officer, narrative, vehicle tag..." oninput="renderReports()"><div id="reportList"></div></div></section>
 <section id="preview" class="screen hidden"><div class="toolbar no-print"><button onclick="window.print()">Print / Save as PDF</button><button class="secondary" onclick="showScreen('reports');renderReports()">Back</button></div><div id="printArea" class="printReport"></div></section>
</main>
<script>
const KEY='hecht_patrol_reports_v1', SETUP='hecht_patrol_setup_v1';let current={};
function loadReports(){return JSON.parse(localStorage.getItem(KEY)||'[]')}function saveReports(r){localStorage.setItem(KEY,JSON.stringify(r));updateCount()}function setup(){return JSON.parse(localStorage.getItem(SETUP)||'{}')}function saveSetup(){localStorage.setItem(SETUP,JSON.stringify({property:defaultProperty.value,officer:defaultOfficer.value}));alert('Setup saved on this iPad.')}function init(){const s=setup();if(s.property)defaultProperty.value=s.property;if(s.officer)defaultOfficer.value=s.officer;updateCount()}function updateCount(){todayCount.textContent=loadReports().length}function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden')}function reportNo(type){const d=new Date();return type+'-'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'-'+String(loadReports().length+1).padStart(4,'0')}function baseFields(type){const s=setup();return `<div class=row><div><label>Report #</label><input id=reportNo value="${reportNo(type)}"></div><div><label>Date</label><input id=date type=date value="${new Date().toISOString().slice(0,10)}"></div><div><label>Time</label><input id=time type=time value="${new Date().toTimeString().slice(0,5)}"></div></div><label>Property</label><input id=property value="${s.property||'Parkside Apartments | 3214 Valley Bluff Drive, Atlanta, GA'}"><div class=row><div><label>Officer Name</label><input id=officer value="${s.officer||'Timothy Heiberger'}"></div><div><label>Shift</label><select id=shift><option>Day</option><option>Evening</option><option selected>Night</option></select></div><div><label>Weather</label><input id=weather placeholder="Clear, cloudy, rain..."></div></div>`}
const incidentChecks=['Suspicious Person','Illegal Dumping','Loud Music/Party','Loitering/Prowling','Open Door / Unsecured Area','Fire / Safety Hazard','Suspicious Vehicle','Domestic Fight','Vandalism','Maintenance Issue','Police Notified','Trespassing','Abandoned Vehicle','Speeding Vehicles','Parking Violation','Broken Lights','Animal Complaint','Burglary/Theft','Pool Violation','Other'];
function checksHtml(arr){return `<div class=checks>${arr.map(x=>`<label class=check><input type=checkbox name=checks value="${x}">${x}</label>`).join('')}</div>`}
function newDAR(){current={type:'DAR'};formTitle.textContent='Daily Activity Report';formBody.innerHTML=baseFields('DAR')+`<h2>Patrol Log</h2><div class=row><div><label>Time</label><input id=patrolTime placeholder="8:30 PM"></div><div><label>Location</label><input id=patrolLocation></div></div><label>Activity</label><input id=activity><label>Status / Action Notes</label><textarea id=status></textarea><h2>Incident / Activity Checklist</h2>${checksHtml(incidentChecks)}<label>Incident Details / Narrative</label><textarea id=narrative placeholder="Objective facts only: names, apt numbers, vehicle tags, exact locations, action taken."></textarea><label>Actions Taken</label>${checksHtml(['Verbal Warning','Incident Report Completed','Police Called','EMS Called','Tow Company Contacted','Management Notified','Resident Contacted','Area Cleared'])}<label>Follow-up Details</label><textarea id=followup></textarea>`;showScreen('formScreen')}
function newIncident(){current={type:'INC'};formTitle.textContent='Incident Report';formBody.innerHTML=baseFields('INC')+`<label>Incident Type</label><select id=incidentType>${incidentChecks.map(x=>`<option>${x}</option>`).join('')}</select><div class=row><div><label>Exact Location</label><input id=location></div><div><label>Apt / Unit</label><input id=unit></div></div><label>Persons / Description</label><textarea id=persons></textarea><label>Vehicle Information</label><textarea id=vehicle></textarea><label>Detailed Narrative</label><textarea id=narrative></textarea><label>Action Taken</label><textarea id=action></textarea><label>Management Follow-up</label><textarea id=followup></textarea>`;showScreen('formScreen')}
function newVehicle(){current={type:'VEH'};formTitle.textContent='Vehicle / Tow Report';formBody.innerHTML=baseFields('VEH')+`<div class=row><div><label>Make / Model</label><input id=makeModel></div><div><label>Color</label><input id=color></div><div><label>Tag #</label><input id=tag></div><div><label>State</label><input id=state></div></div><label>Location Found</label><input id=location><label>Tow Requested</label><select id=tow><option>No</option><option>Yes</option></select><label>Narrative / Action</label><textarea id=narrative></textarea>`;showScreen('formScreen')}
function newMaintenance(){current={type:'MNT'};formTitle.textContent='Lights Out / Maintenance Report';formBody.innerHTML=baseFields('MNT')+`<label>Issue Type</label>${checksHtml(['Lights Out','Damaged Property','Water Leak','Broken Lock/Door','Gate Issue','Trip Hazard','Trash Area Issue','Other'])}<div class=row><div><label>Building</label><input id=building></div><div><label>Location</label><input id=location></div></div><label>Details / Location</label><textarea id=narrative></textarea><label>Management Notified?</label><select id=notified><option>Yes</option><option>No</option></select>`;showScreen('formScreen')}
function newTrespass(){current={type:'CTW'};formTitle.textContent='Criminal Trespass Warning';formBody.innerHTML=baseFields('CTW')+`<label>Person Warned</label><input id=person><div class=row><div><label>Apt / Unit</label><input id=unit></div><div><label>ID Requested</label><select id=idreq><option>No</option><option>Yes</option></select></div></div><label>Description / Clothing</label><textarea id=description></textarea><label>Warning Details</label><textarea id=narrative placeholder="Advised subject they are prohibited from returning to property under O.C.G.A. 16-7-21..."></textarea>`;showScreen('formScreen')}
function newTraffic(){current={type:'TRF'};formTitle.textContent='Traffic Warning';formBody.innerHTML=baseFields('TRF')+`<label>Violation</label><select id=violation><option>Speeding</option><option>Reckless Driving</option><option>Parking Violation</option><option>Stop Sign Violation</option><option>Other</option></select><div class=row><div><label>Vehicle Tag</label><input id=tag></div><div><label>Vehicle Description</label><input id=vehicle></div></div><label>Location</label><input id=location><label>Warning Details</label><textarea id=narrative></textarea>`;showScreen('formScreen')}
function collect(){const fields={};formBody.querySelectorAll('input,select,textarea').forEach(el=>{if(el.type==='checkbox'){if(el.checked)(fields[el.name]||(fields[el.name]=[])).push(el.value)}else fields[el.id]=el.value});return {id:Date.now(),type:current.type,created:new Date().toISOString(),fields}}
function saveCurrentReport(){const r=collect();const arr=loadReports();arr.unshift(r);saveReports(arr);current=r;alert('Report saved on this iPad.');showScreen('reports');renderReports()}
function title(r){return `${r.fields.reportNo||r.type} | ${r.fields.date||''} | ${r.fields.property||''}`}function renderReports(){const q=(search?.value||'').toLowerCase();const arr=loadReports().filter(r=>JSON.stringify(r).toLowerCase().includes(q));reportList.innerHTML=arr.map(r=>`<div class=report-item><span class=badge>${r.type}</span> <b>${title(r)}</b><div class=muted>${r.fields.officer||''} ${r.fields.shift?('| '+r.fields.shift):''}</div><button onclick="previewSaved(${r.id})">Preview / Print</button><button class=secondary onclick="emailSaved(${r.id})">Email</button><button class=danger onclick="deleteSaved(${r.id})">Delete</button></div>`).join('')||'<p class=muted>No reports found.</p>'}
function reportHtml(r){const f=r.fields;let rows=Object.keys(f).map(k=>`<tr><th>${labelize(k)}</th><td>${Array.isArray(f[k])?f[k].join(', '):String(f[k]||'').replace(/\n/g,'<br>')}</td></tr>`).join('');return `<h1>HECHT SECURITY PATROL</h1><p><b>${typeName(r.type)}</b><br>Professional Apartment Community Patrol and Reporting</p><table>${rows}</table><p class=small>Confidential client security document - prepared for property management. Generated from Hecht Security Patrol iPad Enterprise Offline App.</p>`}
function labelize(k){return k.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase()).replace('Checks','Checked Items')}function typeName(t){return {DAR:'Daily Activity Report',INC:'Incident Report',VEH:'Vehicle / Tow Report',MNT:'Lights Out / Maintenance Report',CTW:'Criminal Trespass Warning',TRF:'Traffic Warning'}[t]||t}
function previewCurrentReport(){const r=collect();printArea.innerHTML=reportHtml(r);showScreen('preview')}function previewSaved(id){const r=loadReports().find(x=>x.id===id);printArea.innerHTML=reportHtml(r);showScreen('preview')}function emailBody(r){return encodeURIComponent(Object.entries(r.fields).map(([k,v])=>`${labelize(k)}: ${Array.isArray(v)?v.join(', '):v}`).join('\n'))}function emailCurrentReport(){const r=collect();location.href=`mailto:?subject=${encodeURIComponent('Hecht Security Patrol '+(r.fields.reportNo||r.type))}&body=${emailBody(r)}`}function emailSaved(id){const r=loadReports().find(x=>x.id===id);location.href=`mailto:?subject=${encodeURIComponent('Hecht Security Patrol '+(r.fields.reportNo||r.type))}&body=${emailBody(r)}`}function deleteSaved(id){if(confirm('Delete this report from this iPad?')){saveReports(loadReports().filter(x=>x.id!==id));renderReports()}}
function exportBackup(){const blob=new Blob([JSON.stringify({exported:new Date().toISOString(),reports:loadReports(),setup:setup()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hecht-patrol-backup.json';a.click()}function importBackup(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{const data=JSON.parse(reader.result);if(data.reports)saveReports(data.reports);if(data.setup)localStorage.setItem(SETUP,JSON.stringify(data.setup));init();alert('Backup imported.');};reader.readAsText(file)}
init();
</script>
</body>
</html>
